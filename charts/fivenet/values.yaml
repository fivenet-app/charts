# Default values for fivenet.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

# -- Security context (the provided values work with the official container image) https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 2000
  runAsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP

nodeSelector: {}

tolerations: []

affinity: {}
  # Example soft pod anti affinity rule
  #podAntiAffinity:
  #  preferredDuringSchedulingIgnoredDuringExecution:
  #    - podAffinityTerm:
  #        labelSelector:
  #          matchExpressions:
  #            - key: app.kubernetes.io/name
  #              operator: In
  #              values:
  #                - fivenet
  #        topologyKey: kubernetes.io/hostname
  #      weight: 100

ingress:
  # -- If an ingress object should be created.
  enabled: true
  # -- Ingress class name
  className: "nginx"
  annotations: {}
    # kubernetes.io/tls-acme: "true"
    #nginx.ingress.kubernetes.io/ssl-redirect: "true"
    #nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    #nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

ingressGRPC:
  # -- If an ingress object for GRPC API access should be created. Requires TLS certs for HTTPS and a separate subdomain. Used for DBSync and the plugin API.
  enabled: true
  # -- Ingress class name
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "2400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "2400"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example-grpc.local
      paths:
        - path: /services.+
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example-grpc.local

fivenet:
  # -- FiveNet config. See the [config reference documentation](https://fivenet.app/getting-started/configuration/config-reference)
  config:
    # Debug or release mode (affects performance)
    mode: "release"

    # Can be "DEBUG", "INFO", "WARN", "ERROR", "FATAL"
    logLevel: "INFO"
    log:
      # If enabled logs are sent to stderr instead of stdout.
      logToStderr: true
      # Indicates whether to log to a file instead of stdout.
      logToFile: false
      # Logging to file is not recommended inside containers!

      levelOverrides:
        kvstore: "INFO"
        locks: "INFO"
        cron: "INFO"
        perms: "INFO"

    # App-wide secret used to encrypt/decrypt stored data. Must be exactly 32 chars (bytes) long and separate from `jwt.secret`.
    secret: "your_generated_db_secret_32_char"
    # Skips startup checks for database and NATS connectivity. Use only when those services are intentionally unavailable at boot.
    ignoreRequirements: false

    jwt:
      # JWT signing secret. Keep this separate from the root `secret` value and make it at least 32 characters long.
      secret: "your_generated_jwt_secret"

    http:
      listen: ":8080"
      # Admin port for metrics and Go debug endpoints. Keep it bound to localhost or leave it empty to disable the admin server.
      adminListen: ":7070"
      # Canonical public base URL for the FiveNet instance, including the scheme and host.
      publicURL: "https://fivenet.example.com"
      origins:
        # Allowed browser origins for the frontend and API. Add each origin explicitly.
        - "https://fivenet.example.com"
        #- "http://localhost:3000" # Only for development
      # Reverse-proxy IPs or CIDRs that are allowed to forward client IP and protocol headers.
      # In Kubernetes, it is often easier to allow the cluster range, e.g. `10.0.0.0/8`.
      trustedProxies: []
        #- "10.0.0.0/8" # Common Kubernetes cluster IP range
        #- "127.0.0.1" # Only for development
      sessions:
        # Secret used to sign and encrypt session cookies. Keep it random and unique to this deployment.
        cookieSecret: "your_generated_cookie_secret"
        # Cookie domain used for session cookies. Set this to your app's root domain when sharing across subdomains.
        domain: "fivenet.example.com"

    database:
      # Use either a DSN string or the individual host/port/username/password fields below.
      # DSN reference: https://github.com/go-sql-driver/mysql#dsn-data-source-name
      # `parseTime` is always enabled by the application.
      dsn: ""
      # Example for a locally hosted database
      #dsn: "fivenet:changeme@tcp(localhost:3306)/fivenet?collation=utf8mb4_unicode_ci&loc=Europe%2FBerlin"
      #
      # Or use individual parameters instead. Comment out `dsn:` if you set these.
      # Hint: you can set these via environment variables as well, e.g., FIVENET_DATABASE_HOST, FIVENET_DATABASE_PORT,
      # FIVENET_DATABASE_USERNAME, FIVENET_DATABASE_PASSWORD, FIVENET_DATABASE_DATABASE
      #host: "localhost"
      #port: 3306
      #username: "fivenet"
      #password: "changeme"
      #database: "fivenet"

      # Advanced connection settings
      maxOpenConns: 32
      maxIdleConns: 5
      connMaxIdleTime: 15m
      connMaxLifetime: 60m
      disableLocking: false
      # Skip database migrations on startup. Only enable this if migrations are managed externally.
      skipMigrations: false
      custom:
        # To disable a column, set it to `"-"`
        columns:
          user:
            visum: "visum"
            playtime: "playtime"
          vehicle:
            model: "model"
        conditions:
          user:
            filterEmptyName: false

    nats:
      # Default URL for the NATS server used by the bundled docker-compose setup.
      # Replace this when connecting to an external NATS instance.
      url: "nats://fivenet:fivenet_topsecret@nats:4222"
      replicas: 1
      # Prefer these over embedding credentials in the URL when using external auth:
      #nKey: null
      #creds: null

    storage:
      # Select one storage backend. Only the matching subsection is used.
      type: "filesystem"
      filesystem:
        # Local filesystem root and optional key prefix.
        path: "/data"
        prefix: ""
      s3:
        # S3-compatible object storage settings.
        endpoint: ""
        region: "us-east-1"
        accessKeyID: ""
        secretAccessKey: ""
        useSSL: true
        bucketName: ""
        prefix: ""
        retries: 3
        checkOnStartup: false
      metricsEnabled: true
      metricsInterval: 10m

    imageProxy:
      options:
        # Hosts allowed or denied by the image proxy. Deny rules take precedence.
        allowHosts: []
        denyHosts: []
        # Minimum time an image response should stay cached.
        minimumCacheDuration: 30m

    audit:
      # Number of days to keep audit entries before cleanup.
      retentionDays: 90

    oauth2:
      # List of OAuth2 providers.
      providers: []
      # Example for Discord OAuth2 provider configuration
      # - name: "discord"
      #   # Internal provider type used in config and callback routes.
      #   type: "discord"
      #   # Display label shown to users on the login button.
      #   label: "Discord"
      #   # Provider homepage shown for reference in the UI.
      #   homepage: "https://discord.com"
      #   # Iconify icon name or image URL shown on the login button.
      #   icon: "i-simple-icons-discord"
      #   # Optional fallback avatar URL for users without a provider avatar.
      #   #defaultAvatar: ""
      #   # Redirect/callback URL registered with Discord. This must point back to this FiveNet instance.
      #   redirectURL: "https://localhost:3000/api/oauth2/callback/discord"
      #   # OAuth2 client ID issued by Discord for this application.
      #   clientID: "your_discord_oauth2_client_id"
      #   # OAuth2 client secret issued by Discord for this application.
      #   clientSecret: "your_discord_oauth2_client_secret"
      #   # Scopes requested from Discord. Keep these aligned with the data you need.
      #   scopes:
      #     - guilds
      #     - identify
      #   # The endpoints section is optional for the Discord provider since the
      #   # implementation uses the default Discord OAuth2 endpoints.
      #   # It can be used to override the default endpoints if needed.
      #   #endpoints:
      #   #  authURL: "https://discord.com/api/oauth2/authorize"
      #   #  tokenURL: "https://discord.com/api/oauth2/token"
      #   #  userInfoURL: "https://discord.com/api/users/@me"
      # Example for generic OAuth2 provider configuration
      # - name: "my_generic_provider"
      #   # Internal provider name used in config and callback routes.
      #   type: "generic"
      #   # Display label shown to users on the login button.
      #   label: "Generic OAuth2 Provider"
      #   # Provider homepage shown for reference in the UI.
      #   homepage: "https://example.com"
      #   # Iconify icon name or image URL shown on the login button.
      #   icon: "i-simple-icons-openid"
      #   # Optional fallback avatar URL for users without a provider avatar.
      #   defaultAvatar: "https://example.com/images/avatar-default.svg"
      #   # Redirect/callback URL registered with the OAuth2 provider. This must point back to this FiveNet instance.
      #   # Example: https://YOUR_FIVENET_DOMAIN_NAME/api/oauth2/callback/OAUTH_PROVIDER_NAME
      #   redirectURL: "http://example.com/api/oauth2/callback/my_generic_provider"
      #   # OAuth2 client ID issued by the provider for this application.
      #   clientID: "your_generic_oauth2_client_id"
      #   # OAuth2 client secret issued by the provider for this application.
      #   clientSecret: "your_generic_oauth2_client_secret"
      #   # Scopes requested from the provider. Keep these aligned with the data you need.
      #   scopes:
      #     - openid
      #     - nickname
      #     - profile
      #   endpoints:
      #     # Authorization endpoint used to start the OAuth2 flow.
      #     authURL: "https://example.com/oauth2/authorize"
      #     # Token endpoint used to exchange the auth code for a token.
      #     tokenURL: "https://example.com/oauth2/token"
      #     # User information endpoint used to fetch profile data after login.
      #     userInfoURL: "https://example.com/oauth2/user-info"
      #   # Mapping fields tell FiveNet which claims/fields to read from the provider response.
      #   mapping:
      #     # Unique user identifier claim.
      #     id: "sub"
      #     # Username/display-name claim.
      #     username: "nickname"
      #     # Avatar URL claim.
      #     avatar: "picture"

    postalsFile: ".output/public/data/postals.json"

    auth:
      # List of groups that will have access to superuser mode with job admin permissions.
      jobAdminGroups: []
      # List of users that will have access to superuser mode with job admin permissions.
      jobAdminUsers: []

      # List of groups that will have access to superuser mode with config admin permissions.
      configAdminGroups:
        - projektleiter
        - teamleitung
      # List of users that will have access to superuser mode with config admin permissions.
      configAdminUsers: []

    dispatchCenter:
      type: "gksphone"
      convertJobs: []
        #- police

    discord:
      enabled: false
      # If true, the bot will not make any changes to Discord roles or send messages. Useful for testing.
      dryRun: false
      # Discord bot token. Keep this secret and do not share it publicly.
      token: "your_discord_bot_token"
      # If any sync activity is performed at all.
      sync: true

      # Sync server groups to Discord roles.
      groupSync:
        enabled: false
        mapping:
          fraktionsverwaltung:
            roleName: "Fraktionsverwaltung"
            #permissions: 0
            #color: "#9B59B6"
            notSameJob: true
          teamleitung:
            roleName: "Teamleitung"
            #permissions: 0
            #color: "#9B59B6"
      # Sync job, grade, and qualification data to Discord roles.
      userInfoSync:
        enabled: false
        gradeRoleFormat: "[%grade%] %grade_label%"
        employeeRoleFormat: "%s Employees"
        unemployedRoleName: "Citizen"
        jobsAbsceneRoleName: "Absent"
      # Sync qualifications to Discord roles.
      qualifications:
        enabled: true
      # Enable or disable Discord command registration.
      commands:
        enabled: true

        # Toggle individual commands.
        absent: true
        fivenet: true
        help: true
        sync: true

      # Send calendar reminders in Discord.
      calendarReminders: true

    game:
      # First grade number/id. Some servers start at 0, others at 1.
      startJobGrade: 0
      # Automatically delete roles for jobs that no longer exist.
      cleanupRolesForMissingJobs: false

    sync:
      # Enable or disable the sync API endpoint. Required for the FiveNet plugin and DBSync function.
      enabled: false
      # API tokens accepted for sync requests. Keep each token separate and secret.
      apiTokens: []
        #- LONG_RANDOM_API_TOKEN_FOR_DBSYNC

    updateCheck:
      # If enabled, it will check for updates every interval.
      enabled: true
      # Interval for checking updates, e.g., "1h", "30m", "15s"
      interval: "6h"

    icons:
      # If true, the backend server will act as a proxy for the Iconify API (URL specified via `APIURL` setting).
      proxy: false
      # If you are using the proxy mode, make sure to support the Iconify project: https://iconify.design/sponsors/
      apiUrl: "https://api.iconify.design"
      # Path to the directory containing icon sets (used when proxy is disabled; this path works with the official FiveNet container images).
      path: ./icons

    otlp:
      enabled: false
      # Can be "stdout", "grpc", "http"
      type: "stdout"
      # OTLP endpoint URL (must include `http(s)://`)
      url: "http://localhost:4317"
      insecure: false
      timeout: 10s
      environment: "dev"
      ratio: 0.1
      # Additional span/resource attributes.
      attributes:
      # - service.name=fivenet-server
        - k8s.namespace.name=${POD_NAMESPACE}
      headers: {}
        # Example to authenticate with an API key
        #authorization: "OTEL_API_KEY_HERE"
      # Compression for OTLP exporters (`none` or `gzip`).
      compression: "none"
      frontend:
        # Frontend trace endpoint; leave empty to disable frontend instrumentation.
        url: ""
        headers: {}
          # Example to authenticate with an API key
          #authorization: "OTEL_API_KEY_HERE"

# -- Additional environment variables to set in the server, worker and discord pods
additionalEnv: []
  # - name: TZ
  #   value: "Europe/Berlin"

# -- Additional volumes to mount into the server, worker and discord pods
additionalVolumes: []
  # - name: fivenet-data
  #   persistentVolumeClaim:
  #     claimName: fivenet-data-pvc

# -- Additional volume mounts to mount into the server, worker and discord pods
additionalVolumeMounts: []
  # - name: fivenet-data
  #   mountPath: /data

# -- Migration job config
migration:
  # -- Specifies whether the migration job should be created
  enabled: true

server:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  image:
    repository: ghcr.io/fivenet-app/fivenet
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  livenessProbe:
    httpGet:
      path: /readiness
      port: metrics
    failureThreshold: 3
    initialDelaySeconds: 25
    periodSeconds: 10
  readinessProbe: null
  startupProbe:
    httpGet:
      path: /readiness
      port: metrics
    failureThreshold: 30
    initialDelaySeconds: 20
    periodSeconds: 10
  # -- Additional environment variables (e.g., to set the timezone via the TZ variable)
  additionalEnv: []
    # - name: TZ
    #   value: "Europe/Berlin"
  # -- Arguments to pass to the container command
  args:
    - server

# -- Prometheus-operator ServiceMonitor config
serviceMonitor:
  # -- Specifies whether a prometheus-operator ServiceMonitor should be created
  enabled: false
  # -- Additional Labels for the ServiceMonitor object
  additionalLabels: {}
  #namespace: "monitoring"
  namespaceSelector:
  # Default: scrape .Release.Namespace only
  # To scrape all, use the following:
  #  matchNames:
  #    - monitoring
  #   any: true
  # -- (duration) Interval at which metrics should be scraped
  scrapeInterval: 30s
  # honorLabels: true

# -- FiveNet Worker deployment config
worker:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  image:
    repository: ghcr.io/fivenet-app/fivenet
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  livenessProbe:
    httpGet:
      path: /readiness
      port: metrics
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe: null
  startupProbe:
    httpGet:
      path: /readiness
      port: metrics
    initialDelaySeconds: 5
    failureThreshold: 20
    periodSeconds: 10
  # -- Additional environment variables (e.g., to set the timezone via the TZ variable)
  additionalEnv: []
  # -- Arguments to pass to the container command
  args:
    - worker

# -- FiveNet Discord Bot deployment config
discord:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  image:
    repository: ghcr.io/fivenet-app/fivenet
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  livenessProbe:
    httpGet:
      path: /readiness
      port: metrics
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe: null
  startupProbe:
    httpGet:
      path: /readiness
      port: metrics
    initialDelaySeconds: 5
    failureThreshold: 20
    periodSeconds: 10
  # -- Additional environment variables (e.g., to set the timezone via the TZ variable)
  additionalEnv: []
  # -- Arguments to pass to the container command
  args:
    - discord

# -- FiveNet DBSync deployment config
dbsync:
  enabled: false
  replicaCount: 1
  revisionHistoryLimit: 1
  # -- Deployment strategy
  strategy:
    type: Recreate
  image:
    repository: ghcr.io/fivenet-app/fivenet
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
  livenessProbe:
    httpGet:
      path: /readiness
      port: metrics
    initialDelaySeconds: 15
    periodSeconds: 10
  readinessProbe: null
  startupProbe:
    httpGet:
      path: /readiness
      port: metrics
    initialDelaySeconds: 5
    failureThreshold: 20
    periodSeconds: 10
  # -- Additional environment variables (e.g., to set the timezone via the TZ variable)
  additionalEnv: []
  # -- Arguments to pass to the container command
  args:
    - dbsync
    - run
  # -- Persistence configuration (will be mounted at `/state`)
  persistence:
    # -- It is recommended to enable persistence to ensure the state file.
    enabled: false
    # storageClassName: default
    # -- (Optional) Use this to bind the claim to an existing PersistentVolume (PV) by name.
    volumeName: ""
    accessModes:
      - ReadWriteOnce
    # -- Requested size of the PersistentVolumeClaim (PVC).
    size: 1Gi
    annotations: {}
    finalizers:
      - kubernetes.io/pvc-protection
    # selectorLabels: {}
    ## Sub-directory of the PV to mount. Can be templated.
    # subPath: ""
    ## Name of an existing PVC. Can be templated.
    # existingClaim:
    ## Extra labels to apply to a PVC.
    extraPvcLabels: {}

  # -- DBSync config - This only shows some of the most important options, for all options please refer to the [DBSync configuration reference](https://fivenet.app/getting-started/configuration/dbsync-config-reference)
  config:
    # Can be "DEBUG", "INFO", "WARN", "ERROR", "FATAL"
    logLevel: "INFO"
    log:
      # If enabled logs are sent to stderr instead of stdout.
      logToStderr: true
      # Indicates whether to log to a file instead of stdout.
      logToFile: false
      # Contains the configuration for file logging (if LogToFile is true, make sure to configure this).
      file:
        # Path to the log file.
        path: "dbsync.log"
        rotation:
          # MaxSize is the maximum size in megabytes of the log file before it gets rotated.
          maxSize: 100 # MB
          # MaxBackups is the maximum number of old log files to retain.
          maxBackups: 7
          # MaxAge is the maximum number of days to retain old log files based on the timestamp.
          maxAge: 14
          # Compress determines if the rotated log files should be compressed using gzip.
          compress: true
          # Rotation interval for log rotation (e.g., daily rotation).
          rotationInterval: 24h

    # Watch the config file for changes and restart dbsync after reload.
    watchConfig: false
    # Stores incremental sync cursors and last-processed timestamps per table.
    stateFile: "/state/dbsync.state.yaml"

    # Admin server for metrics and health checks. Leave empty to disable it; otherwise keep it local-only if possible.
    adminListen: ":7070"

    # Your **gameservers' database** details
    # Changes to the source require a restart of the dbsync!
    source:
      # Refer to https://github.com/go-sql-driver/mysql#dsn-data-source-name for details
      # Please note that the `parseTime` parameter is always set to true
      dsn: "DB_USER:DB_PASS@tcp(DB_HOST:DB_PORT)/DB_NAME?collation=utf8mb4_unicode_ci&loc=Europe%2FBerlin"
      # Example for a locally hosted database
      #dsn: "fivenet:changeme@tcp(localhost:3306)/fivenet?collation=utf8mb4_unicode_ci&loc=Europe%2FBerlin"
      #
      # Or use individual parameters instead. Comment out `dsn:` if you use these.
      # Hint: you can set these via environment variables as well, e.g., FIVENET_DATABASE_HOST, FIVENET_DATABASE_PORT,
      # FIVENET_DATABASE_USERNAME, FIVENET_DATABASE_PASSWORD, FIVENET_DATABASE_DATABASE
      #host: "localhost"
      #port: 3306
      #username: "fivenet"
      #password: "changeme"
      #database: "fivenet"

      # Advanced connection settings
      maxOpenConns: 12
      maxIdleConns: 5
      connMaxIdleTime: 10m
      connMaxLifetime: 45m
      disableLocking: false

      # Full resync interval for base data such as jobs, job grades, and licenses.
      baseDataResyncInterval: 5m

    # The target FiveNet instance to sync data to (the instance must have the sync API enabled
    # and you need a valid token)
    destination:
      # Sync method to use. `api` is the supported method and sends data through the FiveNet Sync API.
      method: "api"
      # Your FiveNet Sync API details.
      api:
        # FiveNet hostname only, with port if needed. Do not include the protocol or a trailing slash.
        # The target FiveNet instance must be reachable over HTTPS.
        # Do not include the protocol (http:// or https://) here!
        # Do not include a trailing slash!
        #
        # Example:
        # 'https://demo.fivenet.app'   -> 'demo.fivenet.app:443'
        # 'https://fivenet.example.com' -> 'fivenet.example.com:443'
        url: "fivenet.example.com"
        token: "YOUR_SYNC_API_TOKEN"
        # Timeout for API requests.
        timeout: 5s

        # Disable TLS verification. Only use this for testing or self-signed setups.
        insecure: false
        # Disable transport security entirely. Keep this enabled unless you have a very specific reason not to.
        transportSecurity: true

      # Default sync interval. Individual tables can override this in the `tables:` section.
      syncInterval: 3s
      # Log the data that would be synced instead of sending it to FiveNet.
      dryRun: false

    # A query for each "piece of data" FiveNet needs to function
    # The example table names + columns and queries are for the ESX framework
    tables:
      # Jobs of your game server (e.g., police, ambulance, taxi) with name and display label.
      jobs:
        enabled: true
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "jobs"
        # Column mapping used only when no custom `query` is specified.
        columns:
          name: "name"
          label: "label"
        # Custom query to retrieve the jobs. It must return the aliased columns below.
        #
        # Must return result columns named: `job.name`, `job.label`
        #query: |
        #  SELECT
        #    `name` AS `job.name`,
        #    `label` AS `job.label`
        #  FROM
        #    `jobs`
        #  ORDER BY `name`
        #  LIMIT $limit;
        filters: []
          # Example filter to drop jobs starting with "off_". Useful if off-duty jobs should be rewritten elsewhere.
          #- pattern: '^off_'
          #  action: drop

      # Job grades for the jobs, e.g., "police" job has grades "0", "1", "2", etc.
      jobGrades:
        enabled: true
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "job_grades"
        # Column mapping used only when no custom `query` is specified.
        columns:
          jobName: "job_name"
          grade: "grade"
          name: "name"
          label: "label"
        # Custom query to retrieve the job grades data. It must return the aliased columns below.
        #
        # Must return result columns named: `job_grade.job_name`, `job_grade.grade`, `job_grade.name`, `job_grade.label`
        # (With a `WHERE`-condition for the `job_name` column using the `$jobName` parameter)
        #query: |
        #  SELECT
        #    `job_name` AS `job_grade.job_name`,
        #    `grade` AS `job_grade.grade`,
        #    `name` AS `job_grade.name`,
        #    `label` AS `job_grade.label`
        #  FROM
        #    `job_grades`
        #  WHERE
        #    `job_grades`.`job_name` = $jobName
        #  ORDER BY `job_grade.job_name`, `job_grade.grade`
        #  LIMIT $limit;

      # Licenses available on your server, e.g., driver's license, weapon license, etc.
      licenses:
        enabled: true
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "licenses"
        # Column mapping used only when no custom `query` is specified.
        columns:
          type: "type"
          label: "label"
        # Custom query to retrieve the available licenses. It must return the aliased columns below.
        #
        # Must return result columns named: `license.type`, `license.label`
        #query: |
        #  SELECT
        #    `licenses`.`type` AS `license.type`,
        #    `licenses`.`label` AS `license.label`
        #  FROM
        #    `licenses`
        #  ORDER BY `type`
        #  LIMIT $limit;

      # Users/Characters of the game server - This is the main users table,
      # which is used to link to other data to (e.g., vehicles, users' licenses)
      users:
        enabled: true
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "users"
        # If your "players"/"users" data has a timestamp/datetime column that is updated on update,
        # configure it here so that after the initial sync only the changed data is synced again.
        updatedTimeColumn: "last_seen"
        # Column mapping used to build the default query if no custom `query` is specified.
        # `id` and `identifier` are required even with a custom query because they drive incremental syncs.
        columns:
          id: "id"
          identifier: "identifier"
          group: "group"
          firstname: "firstname"
          lastname: "lastname"
          dateOfBirth: "dateofbirth"
          sex: "sex"
          height: "height"
          job: "job"
          jobGrade: "job_grade"
          phoneNumber: "phone_number"
          # Optional columns
          visum: "-" # Indicates that this column is not available
          playtime: "-" # Indicates that this column is not available
        # Custom query to retrieve users data.
        # The identifier column should be a smart combination of values when using a multichar system.
        # E.g., it is prefered to use a ESX like identifier layout for that case `charX:LICENSE`
        #
        # Must return result columns named: `user.user_id`, `user.identifier`, `user.group`, `user.firstname`,
        # `user.lastname`, `user.dateofbirth`, `user.job`, `user.job_grade`, `user.sex` and `user.updated_at` columns
        # Optional columns: `user.phone_number`, `user.height`, `user.visum`, `user.playtime`
        #
        # For advanced users: If an user can has more than one job (e.g., a main job and a secondary job),
        # you should use the `userJobs:` section to query the job(s) of the users instead of returning multiple rows per user in this query, to prevent data duplication and potential performance issues.
        #
        # If an user can has multiple phone numbers, you can return multiple rows per user with the phone number
        # data in the columns `user_phone_number.number` and `user_phone_number.is_primary` (boolean column
        # to indicate the primary phone number, if multiple phone numbers are returned).
        #query: |
        #  SELECT
        #    `id` AS `user.id`,
        #    `identifier` AS `user.identifier`,
        #    `group` AS `user.group`,
        #    `firstname` AS `user.firstname`,
        #    `lastname` AS `user.lastname`,
        #    `dateofbirth` AS `user.dateofbirth`,
        #    `sex` AS `user.sex`,
        #    `height` AS `user.height`,
        #    `job` AS `user.job`,
        #    `job_grade` AS `user.job_grade`,
        #    `phone_number` AS `user.phone_number`,
        #    `visum` AS `user.visum`,
        #    `playtime` AS `user.playtime`,
        #    `last_seen` AS `user.updated_at`
        #  FROM
        #    `users`
        #  $whereCondition
        #  ORDER BY `user.updated_at` ASC, `user.id` ASC
        #  LIMIT $limit;
        # If a lastname is not returned by the query, attempt to split the firstname into two parts.
        splitName: true
        # Normalize date of birth value to the output format if possible
        # Please see the Go `time` pkg documentation on potential date format layouts: https://pkg.go.dev/time#Layout
        dateOfBirth:
          formats:
            - "2006-01-02" # 2000-10-18 = YYYY-MM-DD
            - "02/01/2006" # 09/06/1993 = MM/DD/YYYY
            - "02.01.2006" # 01.08.1982 = DD.MM.YYYY
          outputFormat: "02.01.2006" # DD.MM.YYYY
        valueMapping:
          # This allows to map values to different values for FiveNet
          # E.g., the sex of a char must be either `f`, `m`, or `d`
          sex:
            fallback: 'm'
            values:
              'f': 'f'
              'm': 'm'
              # E.g., if your server uses `male` and `female` instead of `m` and `f`, you can map them like this:
              #'female': 'f'
              #'male': 'm'
        # Drop the user entirely if firstname or lastname is empty/null.
        ignoreEmptyNames: true
        # Filters rewrite selected values before they are sent to FiveNet.
        filters:
          jobs: []
            # Example: `off_police` -> `police`
            #- pattern: '^off_'
            #  action: replace
            #  replacement: ''
            # Example: `ambulance` -> `ems`
            #- pattern: '^ambulance$'
            #  action: replace
            #  replacement: 'ems'
        # Batch resync interval for users. This helps reconcile missed updates over time.
        resyncInterval: 12s

      # Licenses of a user
      userLicenses:
        enabled: true
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "user_licenses"
        # Column mapping used only when no custom `query` is specified.
        columns:
          type: "type"
          ownerIdentifier: "owner"
        # Custom query to retrieve licenses for a specific user. `$identifier` is the user identifier placeholder.
        #
        # Must return result columns named: `user_license.type`, `user_license.owner`
        #query: |
        #  SELECT
        #    `type` AS `user_license.type`,
        #    `owner` AS `user_license.owner`
        #  FROM
        #    `user_licenses`
        #  WHERE
        #    `user_licenses`.`owner` = $identifier
        #  ORDER BY `type`
        #  LIMIT $limit;

      # Jobs of a user (if your users can have multiple jobs, e.g., a main job and a secondary job, it is recommended to enable and use this
      # and return the jobs in a separate query to prevent data duplication and potential performance issues,
      # otherwise you can also return the job data in the main users query)
      userJobs:
        enabled: false
        # Custom query to retrieve jobs for a specific user. `$userId` and `$identifier` are the user placeholders.
        #
        # Must return result columns named: `user_job.job`, `user_job.grade`
        # Optional but recommended: `user_job.is_primary` (boolean column to indicate if it is the primary job,
        # if multiple jobs are returned, otherwise the first is set as primary)
        #query: |
        #  SELECT
        #    `job` AS `user_job.job`,
        #    `grade` AS `user_job.grade`
        #    1 AS `user_job.is_primary`
        #  FROM
        #    `user_jobs`
        #  WHERE
        #    `user_jobs`.`owner` = $identifier
        #  ORDER BY `owner`
        #  LIMIT $limit;

      # User Phone Numbers (if your users can have multiple phone numbers,
      # it is recommended to enable and use this
      userPhoneNumbers:
        enabled: false
        # Custom query to retrieve phone numbers for a specific user. `$identifier` is the user identifier placeholder.
        #
        # Must return result columns named: `user_phone_number.number`, `user_phone_number.is_primary`
        query: |
          SELECT
            `phone_number` AS `user_phone_number.number`,
            (ROW_NUMBER() OVER (ORDER BY `is_primary` DESC) = 1) AS `user_phone_number.is_primary`
          FROM user_phone_numbers
          WHERE user_phone_numbers.identifier = $identifier
          ORDER BY `is_primary` DESC, `phone_number`;

      # Vehicles owned by users
      vehicles:
        enabled: true
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "owned_vehicles"
        # Updated timestamp column used for incremental syncs. Keep it enabled unless you have a reason not to.
        updatedTimeColumn: "updated_at"
        # Column mapping used only when no custom `query` is specified.
        columns:
          ownerIdentifier: "owner"
          # Use this if vehicles are linked by user DB ID instead of identifier.
          #ownerId: "owner"
          plate: "plate"
          type: "type"
          model: "-" # Indicates that this column is not available
        # Custom query to retrieve all vehicles. It must return the aliased columns below.
        #
        # Must return result columns named: `vehicle.owner_id` (the user's DB ID) or `vehicle.owner_identifier`,
        # `vehicle.plate`, `vehicle.type`
        # `vehicle.updated_at` (timestamp/datetime column that is updated on update, used for incremental syncs)
        # Optional columns: `vehicle.model`, `vehicle.job` (for job specific vehicles)
        #query: |
        #  SELECT
        #    `owner` AS `vehicle.owner_identifier`,
        #    `plate` AS `vehicle.plate`,
        #    `type` AS `vehicle.type`,
        #    `model` AS `vehicle.model`
        #    `updated_at` AS `vehicle.updated_at`
        #  FROM
        #    `owned_vehicles`
        #  $whereCondition
        #  ORDER BY `vehicle.updated_at` ASC, `vehicle.plate` ASC
        #  LIMIT $limit;
        #
        # Batch resync interval for vehicles. This helps reconcile missed updates over time.
        resyncInterval: 30s

      # Accounts - Used to, e.g., sync group(s) by license, to accounts.
      accounts:
        enabled: false
        # Primary table for this dataset when using the default column mapping or a custom join.
        tableName: "users"
        # Full account reconciliation interval. Use this to recover from missed updates.
        syncInterval: "1m"
        # Updated timestamp column used for incremental syncs. Keep it enabled unless you have a reason not to.
        updatedTimeColumn: "updated_at"
        # Query to retrieve account data, including primary and secondary groups.
        #
        # Must return result columns named: `account_update.license`, `account_update.group` (primary group)
        # Optional columns: `account_update.groups` (comma-separated list of groups, if `account_update.group` is
        # empty `account_update.group` is used)
        # Query to retrieve all users that are not in the `user` group. Add any other non-superuser groups here too.
        query: |
          SELECT
            `license` AS `account_update.license`,
            `group` AS `account_update.group`,
            CASE
              WHEN `group` IS NULL OR `group` = '' THEN JSON_ARRAY()
              ELSE JSON_ARRAY(`group`)
            END AS `account_update.groups`
          FROM (
            SELECT
              SUBSTRING_INDEX(`identifier`, ':', -1) AS `license`,
              `group`
            FROM `users`
            WHERE `group` NOT IN ('user')
          ) AS `src`
          $whereCondition
          ORDER BY `license`
          LIMIT $limit;
        # If enabled, the accounts table `groups` column will be cleared and replaced with the newly synced data.
        clearBeforeInsert: true

    tableManager:
      # Automatically create missing `updated_at` columns for tables that configure `updatedTimeColumn`.
      enabled: true

    # Per-query sync limits. Lower these if you hit performance issues or timeouts; do not raise them above the sync API maximums.
    limits:
      # Base data limits.
      jobs: 200
      licenses: 200
      # Main data limits.
      accounts: 200
      users: 150
      vehicles: 400

# -- NATS server/cluster config values: https://artifacthub.io/packages/helm/nats/nats#values
nats:
  # -- If disabled you must run your own Nats server or cluster.
  enabled: true
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          enabled: true
          size: 5Gi
          #storageClassName: default
      memoryStore:
        enabled: true
        # ensure that container has a sufficient memory limit greater than maxSize
        maxSize: 64Mi

    merge:
      accounts:
        fivenet:
          jetstream: enabled
          users:
            # You should change the username and password
            - user: "fivenet"
              password: "fivenet"
      # User tracker can create big update events
      max_payload: 3145728

  promExporter:
    enabled: true
    image:
      repository: docker.io/natsio/prometheus-nats-exporter

    podMonitor:
      enabled: false # enable only if your have the prometheus-operator deployed
      patch:
        - op: add
          path: /spec/podMetricsEndpoints/0/interval
          value: 30s

# -- Extra objects to deploy (value evaluated as a template)
extraObjects: []
